# CI — Continuous Integration
#
# Запускается при каждом push и pull request.
# Выполняет те же проверки, что и pre-commit хуки локально.
# Это страховка: если кто-то обойдёт хуки (--no-verify), CI поймает.

name: CI

# КОГДА запускать:
# - push: при каждом пуше в любую ветку
# - pull_request: при создании/обновлении PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Минимальные права (безопасность):
# workflow читает код, но НЕ может ничего писать
permissions:
  contents: read

# Отменяет предыдущие запуски в той же ветке (экономит CI-минуты)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Проверки pre-commit (структура, rules, скиллы, скрипты)
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Шаг 1: Скачать код из репозитория в виртуалку
      - name: Checkout code
        uses: actions/checkout@v6

      # Шаг 2: Установить Python (нужен для наших скриптов)
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Шаг 3: Кэширование pre-commit (ускоряет повторные запуски)
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Шаг 4: Установить и запустить ВСЕ pre-commit хуки
      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

  # Job 2: Unit & Integration тесты
  test:
    name: Unit & Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests
        run: make test

      # Coverage check: пороги из standard-testing.md § 6
      # critical ≥80%, standard ≥60%, low ≥40%
      # Активируется при появлении pytest-cov в зависимостях сервисов
      # - name: Check coverage
      #   run: |
      #     pip install pytest-cov
      #     pytest src/ --cov=src/ --cov-report=term-missing --cov-fail-under=60

  # Job 3: E2E тесты (docker-compose.test.yml)
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run E2E tests
        run: make test-e2e

  # Job 4: Линтинг
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run linters
        run: make lint

  # Job 5: Проверка зависимостей на уязвимости (только PR)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
