# =============================================================================
# SSOT: Метки проекта
# =============================================================================
#
# Единственный источник истины для GitHub Labels.
#
# Синхронизация с GitHub:
#   python .github/.instructions/.scripts/sync-labels.py
#   или вручную: gh label create "name" --description "desc" --color "hex"
#
# Стандарт: .github/.instructions/labels/standard-labels.md
#
# =============================================================================

# =============================================================================
# TYPE — тип задачи (ОБЯЗАТЕЛЬНО: ровно одна метка)
# =============================================================================
- name: "bug"
  description: "🐛 Баг — нечто работает не так, как ожидалось"
  color: "d73a4a"

- name: "task"
  description: "🔧 Техническая задача"
  color: "0075ca"

- name: "docs"
  description: "📚 Документация"
  color: "0075ca"

- name: "refactor"
  description: "♻️ Рефакторинг без изменения функциональности"
  color: "0075ca"

- name: "feature"
  description: "✨ Новая функциональность"
  color: "0e8a16"

- name: "infra"
  description: "🏗️ Инфраструктура"
  color: "5319e7"

- name: "test"
  description: "🧪 Тесты"
  color: "1d76db"

# =============================================================================
# PRIORITY — приоритет (ОБЯЗАТЕЛЬНО: ровно одна метка)
# =============================================================================
# Критерии выбора:
#   critical — блокирует production (падение, security, потеря данных)
#   high     — блокирует разработку (критичный для спринта)
#   medium   — обычная задача (фича без deadline)
#   low      — можно отложить (nice-to-have)
# =============================================================================
- name: "critical"
  description: "🔴 Блокирует production"
  color: "d73a4a"

- name: "high"
  description: "🟠 Высокий приоритет"
  color: "ff6b6b"

- name: "medium"
  description: "🟡 Средний приоритет"
  color: "ffa500"

- name: "low"
  description: "🟢 Низкий приоритет"
  color: "ffd700"

# =============================================================================
# STATUS — статус работы (опционально)
# =============================================================================
- name: "ready"
  description: "📋 Готово к работе"
  color: "8b5cf6"

- name: "wip"
  description: "🚧 Work in Progress"
  color: "8b5cf6"

- name: "in-review"
  description: "👀 На code review"
  color: "8b5cf6"

- name: "blocked"
  description: "🚫 Заблокировано (ожидает зависимости)"
  color: "8b5cf6"

# =============================================================================
# AREA — область кода (опционально, максимум 3)
# =============================================================================
- name: "backend"
