name: Баг-репорт
description: Сообщить о баге или неожиданном поведении
title: "[Bug]: "
labels:
  - bug
  - priority:medium
body:
  - type: textarea
    id: task-description
    attributes:
      label: Описание задачи
      description: "Что происходит, что ожидалось, в каком сервисе. Шаги воспроизведения."
      placeholder: |
        При загрузке CSV-файла > 10MB эндпоинт POST /api/import возвращает 500.
        Ожидание: файл обрабатывается или возвращается 413.

        Шаги воспроизведения:
        1. Перейти в '...'
        2. Загрузить файл > 10MB
        3. Увидеть ошибку 500

        **Сервис:** api-gateway
    validations:
      required: true

  - type: textarea
    id: documents
    attributes:
      label: Документы для изучения
      description: "Документы для понимания контекста бага. Формат: таблица | # | Документ | Путь | Что искать |"
      placeholder: |
        | # | Документ | Путь | Что искать |
        |---|----------|------|-----------|
        | 1 | Конвенции API | specs/docs/.system/conventions.md | Формат ошибок, лимиты |
        | 2 | Сервисная документация | specs/docs/api-gateway.md | Code Map, обработка загрузок |
    validations:
      required: true

  - type: textarea
    id: assignment
    attributes:
      label: Задание
      description: "Пошаговые инструкции по исправлению бага"
      placeholder: |
        1. **Найди обработчик** в `src/.../routes/...`.
        2. **Исправь логику** — описание что изменить.
        3. **Напиши тест** — покрыть сценарий.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Критерии готовности
      description: "Как проверить что баг исправлен"
      placeholder: |
        - [ ] Ошибка больше не воспроизводится
        - [ ] Тест покрывает сценарий
        - [ ] Существующая функциональность не нарушена
    validations:
      required: true

  - type: textarea
    id: practical-context
    attributes:
      label: Практический контекст
      description: "Как воспроизвести, окружение, команды запуска"
      placeholder: |
        **Как воспроизвести:** curl -X POST ...
        **Окружение:** Production / Staging / Local
        **Версия:** v1.0.0
        **Как запустить:** make dev
        **Как проверить:** cd src/... && npm test
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: Вставьте релевантные логи (опционально)
      render: bash

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист
      options:
        - label: Я поискал похожие Issues
          required: true
        - label: Я предоставил всю необходимую информацию
          required: true
