name: Инфраструктура
description: Docker, CI/CD, монорепо, конфиги окружений
title: "[Infra]: "
labels:
  - infra
body:
  - type: textarea
    id: task-description
    attributes:
      label: Описание задачи
      description: "ЧТО нужно сделать и ЗАЧЕМ. Какая инфраструктурная проблема решается"
      placeholder: |
        Настроить Docker Compose для локальной разработки: все сервисы + БД.
        Разработчики смогут запускать весь стек одной командой.

        **Зависит от:** #100 (базовые Dockerfile) — ДОЛЖЕН быть готов.
    validations:
      required: true

  - type: textarea
    id: documents
    attributes:
      label: Документы для изучения
      description: "Документы для понимания контекста. Формат: таблица | # | Документ | Путь | Что искать |"
      placeholder: |
        | # | Документ | Путь | Что искать |
        |---|----------|------|-----------|
        | 1 | Инфраструктура | specs/docs/.system/infrastructure.md | Порты, БД, Docker |
        | 2 | Обзор системы | specs/docs/.system/overview.md | Карта сервисов |
    validations:
      required: true

  - type: textarea
    id: assignment
    attributes:
      label: Задание
      description: "Пошаговые инструкции ЧТО ИМЕННО сделать"
      placeholder: |
        1. **Создай** `platform/docker/docker-compose.yml` — все сервисы.
        2. **Настрой** volumes, networks, healthchecks.
        3. **Проверь** запуск через `make dev`.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Критерии готовности
      description: "Как проверить результат"
      placeholder: |
        - [ ] make dev запускает все сервисы
        - [ ] Сервисы доступны на ожидаемых портах
        - [ ] Логи не содержат ошибок
    validations:
      required: true

  - type: textarea
    id: practical-context
    attributes:
      label: Практический контекст
      description: "Существующая инфраструктура, команды, окружение"
      placeholder: |
        **Существующий код:** platform/docker/ содержит: Dockerfile.base
        **Как запустить:** make dev
        **Как проверить:** docker ps → все контейнеры running
    validations:
      required: true

  - type: checkboxes
    id: subtasks
    attributes:
      label: Подзадачи
      description: Разбейте задачу на части, если возможно
      options:
        - label: Подзадача 1
        - label: Подзадача 2
