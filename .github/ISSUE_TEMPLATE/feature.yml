name: Новая функциональность
description: Новый эндпоинт, UI-компонент, бизнес-логика
title: "[Feature]: "
labels:
  - feature
body:
  - type: textarea
    id: task-description
    attributes:
      label: Описание задачи
      description: "ЧТО нужно сделать и ЗАЧЕМ. 2-3 предложения + метаданные (сервис, зависимости)"
      placeholder: |
        Добавить возможность экспорта данных в CSV для эндпоинта API.
        Пользователи смогут скачать отчёт в удобном формате.

        **Сервис:** api-gateway
        **Зависит от:** #120 (авторизация) — ДОЛЖЕН быть готов.
    validations:
      required: true

  - type: textarea
    id: documents
    attributes:
      label: Документы для изучения
      description: "Документы для изучения перед началом работы. Формат: таблица | # | Документ | Путь | Что искать |"
      placeholder: |
        | # | Документ | Путь | Что искать |
        |---|----------|------|-----------|
        | 1 | Сервисная документация | specs/docs/api-gateway.md | Code Map, эндпоинты |
    validations:
      required: true

  - type: textarea
    id: assignment
    attributes:
      label: Задание
      description: "Пошаговые инструкции ЧТО ИМЕННО сделать"
      placeholder: |
        1. **Создай `src/.../export.ts`** — описание.
        2. **Добавь роут** в `src/.../routes.ts` — GET /api/export/csv.
        3. **Напиши тесты** — happy path + edge cases.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Критерии готовности
      description: "Как проверить результат. Для Plan Dev — ссылка на Plan Test + TC-N"
      placeholder: |
        - [ ] Эндпоинт работает корректно
        - [ ] Тесты покрывают основные сценарии
        - [ ] Документация API обновлена
    validations:
      required: true

  - type: textarea
    id: practical-context
    attributes:
      label: Практический контекст
      description: "Существующий код, экспорты зависимостей, команды запуска"
      placeholder: |
        **Существующий код:** src/api-gateway/ содержит: routes/, controllers/
        **Как запустить:** make dev → http://localhost:3000
        **Как проверить:** cd src/api-gateway && npm test
    validations:
      required: true

  - type: checkboxes
    id: subtasks
    attributes:
      label: Подзадачи
      description: Разбейте задачу на части, если возможно
      options:
        - label: Подзадача 1
        - label: Подзадача 2
